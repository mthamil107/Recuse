# Kustomize base for the Recuse Kubernetes admission webhook.
#
# Apply with:  kubectl apply -k manifests/
# (after running hack/gen-certs.sh to create the TLS Secret and inject the
# caBundle into the ValidatingWebhookConfiguration).
#
# tls-secret.placeholder.yaml is intentionally NOT included: the real Secret is
# created out-of-band by hack/gen-certs.sh (or cert-manager).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - validatingwebhook.yaml

# Pin/override the image tag here for your environment, e.g.:
# images:
#   - name: ghcr.io/mthamil107/recuse-webhook
#     newTag: v0.1.0
