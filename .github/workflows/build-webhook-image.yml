name: build-webhook-image

# Builds and pushes the Recuse Kubernetes admission webhook image to GHCR.
# Triggers: version tags (v*) and manual dispatch. PRs only build (no push).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:
    paths:
      - "adapters/kubernetes/**"
      - ".github/workflows/build-webhook-image.yml"

env:
  IMAGE: ghcr.io/mthamil107/recuse-webhook

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/kubernetes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: adapters/kubernetes/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: static build sanity (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o /tmp/recuse-webhook .

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR with GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: adapters/kubernetes
          file: adapters/kubernetes/Dockerfile
          platforms: linux/amd64
          # Push only on tags / manual dispatch; PRs build but do not push.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
