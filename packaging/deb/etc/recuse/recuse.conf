# Recuse SSH adapter configuration
# ---------------------------------
# This file is shell-sourceable (KEY="VALUE"). It is a dpkg conffile: your
# edits here are preserved across package upgrades. /etc/recuse/banner.txt is
# rendered from it.
#
# After editing the values below to describe YOUR system's policy, re-render
# the banner with:
#     sudo /usr/share/recuse/render-banner && sudo sshd -t && \
#       sudo systemctl reload ssh
# or simply:  sudo dpkg-reconfigure recuse-ssh
#
# The Recuse Signal is a COOPERATIVE policy channel (the access-control
# analogue of robots.txt). It is NOT a security control. See the spec
# (recuse-signal-v0.1, §9).

# REQUIRED: absolute URL to YOUR human-readable AI-access policy.
# Leaving this at the example.com default is wrong — agents that honor the
# signal will be pointed at a page you do not control. Set it.
RECUSE_REF="https://example.com/ai-policy"

# Why automated access is governed here.
# One of: production | pii | compliance | change-freeze | unowned | other
RECUSE_REASON="production"

# Who the signal targets.
# One of: all-automation | llm-agents | unattended
RECUSE_SCOPE="all-automation"

# What you are asking conforming agents to do.
# One of: deny | throttle | warn
#   deny     -> a conforming agent MUST disconnect / abort.
#   throttle -> a conforming agent SHOULD slow down and proceed cautiously.
#   warn     -> advisory only; a conforming agent MAY proceed.
RECUSE_DIRECTIVE="deny"

# --- Optional behavioral throttle ------------------------------------------
# OFF by default. The cooperative signal (banner + JSON log) works fully
# WITHOUT this. The throttle is a separate, opt-in convenience that adds a
# small, BOUNDED delay to rapid repeat connections from the same source.
#
# SAFETY GUARANTEES (enforced in /usr/sbin/recuse-pam-hook, not just here):
#   * The throttle only ever DELAYS a session. It NEVER blocks, denies, or
#     fails a login under any circumstance.
#   * The delay is HARD-CAPPED at 10 seconds regardless of the value below.
#   * IPs listed in RECUSE_THROTTLE_ALLOW_IPS are NEVER delayed. Put your own
#     admin / jump-host IP here so you can never be slowed down.
#   * If anything in the throttle path errors, it is swallowed and the login
#     proceeds normally.
# This is still NOT a security control; it cannot keep anyone out.

# Master switch. Must be exactly "true" to enable. Anything else = OFF.
RECUSE_THROTTLE_ENABLED="false"

# Connections from one source IP within the window before throttling starts.
RECUSE_THROTTLE_MAX_CONN="5"

# Length of the sliding window, in seconds, used to count recent connections.
RECUSE_THROTTLE_WINDOW_SECONDS="10"

# Delay applied (in seconds) once a source is over the rate. Bounded; the hook
# hard-caps the effective delay at 10s. This NEVER denies the connection.
RECUSE_THROTTLE_DELAY_SECONDS="2"

# Space-separated list of source IPs that are NEVER throttled. Put your admin
# IP / jump host here so the throttle can never slow you down.
# Example: RECUSE_THROTTLE_ALLOW_IPS="203.0.113.7 198.51.100.10"
RECUSE_THROTTLE_ALLOW_IPS=""
